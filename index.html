<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git hub issue tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="flex items-center justify-center h-screen">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto space-y-3">
        <div class="mx-auto">
            <img src="./assets/github-logo.png" alt="">
        </div>
        <h2 class="text-2xl text-center font-bold">GitHub Issues Tracker</h2>
        <h2 class="text-center font-semibold">Sign in to manage your issues</h2>
        <div>
            <label class="label">Username</label>
        <input id="input-name" type="email" class="input" placeholder="Enter Username" />
        </div>

        <div>
            <label class="label">Password</label>
        <input id="input-password" type="password" class="input" placeholder="Enter Password" />
        </div>

        <button id="login-btn" class="btn btn-primary mt-4">Login</button>
    </fieldset>
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
